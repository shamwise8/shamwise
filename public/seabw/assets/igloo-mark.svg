<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Padel racquet, igloo pattern">
  <defs>
    <clipPath id="racquet-head">
      <ellipse cx="40" cy="38" rx="28" ry="32"/>
    </clipPath>
  </defs>

  <!-- Handle -->
  <rect x="34" y="72" width="12" height="32" rx="4" fill="#477dfd" stroke="#00142d" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="34" y1="80" x2="46" y2="80" stroke="#00142d" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="88" x2="46" y2="88" stroke="#00142d" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="96" x2="46" y2="96" stroke="#00142d" stroke-width="1" opacity="0.5"/>

  <!-- Throat -->
  <path d="M 32 72 L 30 64 Q 30 58 36 56 L 44 56 Q 50 58 50 64 L 48 72 Z" fill="#80abff" stroke="#00142d" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Head background -->
  <ellipse cx="40" cy="38" rx="28" ry="32" fill="#f5fdff" stroke="#00142d" stroke-width="2.5"/>

  <!-- Ice-block pattern on head face (clipped to ellipse) -->
  <g clip-path="url(#racquet-head)">
    <!-- Sky-blue accent tiles -->
    <rect x="24" y="6" width="16" height="16" fill="#80abff"/>
    <rect x="32" y="22" width="16" height="16" fill="#80abff"/>
    <rect x="40" y="38" width="16" height="16" fill="#80abff"/>
    <rect x="16" y="54" width="16" height="16" fill="#80abff"/>

    <!-- Horizontal block courses -->
    <line x1="8" y1="22" x2="72" y2="22" stroke="#00142d" stroke-width="1.5"/>
    <line x1="8" y1="38" x2="72" y2="38" stroke="#00142d" stroke-width="1.5"/>
    <line x1="8" y1="54" x2="72" y2="54" stroke="#00142d" stroke-width="1.5"/>

    <!-- Vertical dividers, staggered like masonry -->
    <line x1="24" y1="6" x2="24" y2="22" stroke="#00142d" stroke-width="1.5"/>
    <line x1="40" y1="6" x2="40" y2="22" stroke="#00142d" stroke-width="1.5"/>
    <line x1="56" y1="6" x2="56" y2="22" stroke="#00142d" stroke-width="1.5"/>

    <line x1="16" y1="22" x2="16" y2="38" stroke="#00142d" stroke-width="1.5"/>
    <line x1="32" y1="22" x2="32" y2="38" stroke="#00142d" stroke-width="1.5"/>
    <line x1="48" y1="22" x2="48" y2="38" stroke="#00142d" stroke-width="1.5"/>
    <line x1="64" y1="22" x2="64" y2="38" stroke="#00142d" stroke-width="1.5"/>

    <line x1="24" y1="38" x2="24" y2="54" stroke="#00142d" stroke-width="1.5"/>
    <line x1="40" y1="38" x2="40" y2="54" stroke="#00142d" stroke-width="1.5"/>
    <line x1="56" y1="38" x2="56" y2="54" stroke="#00142d" stroke-width="1.5"/>

    <line x1="16" y1="54" x2="16" y2="70" stroke="#00142d" stroke-width="1.5"/>
    <line x1="32" y1="54" x2="32" y2="70" stroke="#00142d" stroke-width="1.5"/>
    <line x1="48" y1="54" x2="48" y2="70" stroke="#00142d" stroke-width="1.5"/>
    <line x1="64" y1="54" x2="64" y2="70" stroke="#00142d" stroke-width="1.5"/>
  </g>

  <!-- Re-stroke head outline above pattern -->
  <ellipse cx="40" cy="38" rx="28" ry="32" fill="none" stroke="#00142d" stroke-width="2.5"/>
</svg>
